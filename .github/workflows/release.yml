name: Release

# Déclencheur : push d'un tag `v*` (ex: v0.2.0). À chaque release, ce workflow :
#   1. Build sur macOS (Intel + Apple Silicon) ET Windows (x64) en parallèle.
#   2. Signe les binaires avec la clé privée (secret GitHub TAURI_SIGNING_PRIVATE_KEY).
#   3. Crée une GitHub Release "draft" avec les fichiers + un `latest.json` manifest.
#   4. L'app installée chez tes collègues check ce `latest.json` au démarrage et
#      propose l'update si la version est plus récente.
#
# Secrets nécessaires dans Settings → Secrets and variables → Actions :
#   - TAURI_SIGNING_PRIVATE_KEY  (contenu du fichier .keys/talia.key, en clair)
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (vide si tu as généré sans password)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install deps Linux (dev tray etc.)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install front deps
        run: pnpm install

      - name: Build + sign + upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Talia Lookup ${{ github.ref_name }}'
          releaseBody: 'Voir CHANGELOG. Téléchargez le binaire correspondant à votre OS ci-dessous, ou laissez l''app se mettre à jour toute seule.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
